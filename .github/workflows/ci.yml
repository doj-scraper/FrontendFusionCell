name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fusioncell
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/fusioncell
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: 12345678901234567890123456789012
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage
