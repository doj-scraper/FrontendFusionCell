name: E2E

on:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fusioncell
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/fusioncell
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: "ci-test-next-auth-secret-key-32-chars-long"
      STRIPE_SECRET_KEY: sk_test_ci
      STRIPE_WEBHOOK_SECRET: whsec_ci
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
